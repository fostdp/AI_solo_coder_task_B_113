syntax = "proto3";
package transport;
option go_package = "transport/proto";

service TransportService {
    rpc ScoreRequest (ScoreRequest) returns (ScoreResponse);
    rpc ScoreBatch (stream ScoreRequest) returns (stream ScoreResponse);
    rpc GetStats (StatsRequest) returns (StatsResponse);
}

message ScoreRequest {
    uint32 request_id = 1;
    uint32 bed_id = 2;
    uint32 from_bed_id = 3;
    uint32 to_bed_id = 4;
    double distance = 5;
    bool urgent = 6;
    int32 priority = 7;
    int32 hour_of_day = 8;
    int32 patient_age = 9;
    double vital_stability = 10;
    double infection_risk = 11;
}

message ScoreResponse {
    uint32 request_id = 1;
    int32 risk_score = 2;
    string risk_level = 3;
    double adverse_event_prob = 4;
    map<string, double> feature_contrib = 5;
    repeated string recommendations = 6;
    bool used_default_distance = 7;
    bool used_default_vitals = 8;
    int64 scored_at_unix = 9;
    bool success = 10;
    string error = 11;
}

message StatsRequest {}
message StatsResponse {
    int64 total_scores = 1;
    double avg_score = 2;
    map<string, int64> level_counts = 3;
}
