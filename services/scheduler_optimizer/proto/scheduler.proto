syntax = "proto3";
package scheduler;
option go_package = "scheduler/proto";

service SchedulerService {
    rpc Solve (SolveRequest) returns (SolveResponse);
    rpc SolveStream (SolveRequest) returns (stream SolveProgress);
    rpc GetSuggestions (SuggestRequest) returns (SuggestResponse);
    rpc GetChangeRate (StatsRequest) returns (ChangeRateResponse);
    rpc SetStabilityLambda (LambdaRequest) returns (AckResponse);
}

message BedRisk {
    uint32 bed_id = 1;
    double infection_risk = 2;
}

message SolveRequest {
    repeated BedRisk bed_risks = 1;
    int32 negative_pressure_beds = 2;
    int32 nurses_per_shift = 3;
    double stability_lambda = 4;
    int64 deadline_ms = 5;
    bool use_greedy_fallback = 6;
    map<string, double> objective_weight = 7;
}

message SolveResponse {
    string solution_id = 1;
    map<uint32, string> assignments = 2;
    map<string, repeated uint32> schedule = 3;
    map<string, double> objective = 4;
    repeated string unmet_needs = 5;
    repeated Suggestion suggestions = 6;
    string status = 7;
    double change_rate = 8;
    int64 solve_time_ms = 9;
    bool is_greedy_fallback = 10;
}

message SolveProgress {
    int32 phase = 1;
    string message = 2;
    double percent_complete = 3;
}

message Suggestion {
    string type = 1;
    uint32 bed_id = 2;
    string from = 3;
    string to = 4;
    string reason = 5;
}

message SuggestRequest {
    string previous_solution_id = 1;
    string current_solution_id = 2;
}

message SuggestResponse {
    repeated Suggestion suggestions = 1;
}

message StatsRequest {}

message ChangeRateResponse {
    double latest_change_rate = 1;
    double average_change_rate = 2;
    int64 total_solves = 3;
}

message LambdaRequest {
    double lambda = 1;
}

message AckResponse {
    bool success = 1;
    string message = 2;
}
